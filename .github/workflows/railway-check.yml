name: Validate Railway Deployment

on:
  pull_request:

jobs:
  check-railway-deployment:
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Railway Deployment
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          MAX_RETRIES: 30
          WAIT_SECONDS: 30
        run: |
          echo "Checking Railway deployment status..."

          # Function to check deployment status
          check_status() {
            echo "Fetching deployments for project $PROJECT_ID..."
            deployments=$(curl -s -X POST "https://backboard.railway.app/graphql/v2" \
              -H "Authorization: Bearer $RAILWAY_API_TOKEN" \
              -H "Content-Type: application/json" \
              -d '{
                "query": "query { project(id: \"'$PROJECT_ID'\") { deployments(last: 5) { edges { node { id status createdAt meta { branch } }}}}}"
              }')
            
            # Extract deployment related to the PR branch
            branch="${{ github.head_ref }}"
            latest_deployment=$(echo "$deployments" | jq -r ".data.project.deployments.edges[] | select(.node.meta.branch == \"$branch\") | .node.status" | head -n 1)

            echo "Latest deployment status for branch '$branch': $latest_deployment"
            echo "$latest_deployment"
          }

          # Polling loop to wait for success
          attempt=0
          while [ $attempt -lt $MAX_RETRIES ]; do
            status=$(check_status)
            
            if [ "$status" == "SUCCESS" ]; then
              echo "✅ Deployment succeeded!"
              exit 0
            elif [ "$status" == "FAILED" ]; then
              echo "❌ Deployment failed!"
              exit 1
            fi
            
            echo "⏳ Waiting... ($attempt/$MAX_RETRIES)"
            sleep $WAIT_SECONDS
            attempt=$((attempt + 1))
          done

          echo "❌ Timeout: Deployment did not complete in time."
          exit 1