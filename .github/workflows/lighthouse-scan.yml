name: Lighthouse Scan

on:
  pull_request:
    branches:
      - main

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libnss3

      - name: Install Chrome
        run: |
          wget https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo dpkg -i google-chrome-stable_current_amd64.deb
          sudo apt-get install -f

      - name: Install Lighthouse
        run: npm install -g lighthouse

      - name: Run Lighthouse
        run: lighthouse https://www.patrickroelofs.com --output json --output-path ./lighthouse-report.json --chrome-flags="--headless"

      - name: Convert Lighthouse report to Markdown
        run: |
          cat <<EOF > convert-lighthouse-report.js
          const fs = require('fs');
          const report = JSON.parse(fs.readFileSync('./lighthouse-report.json', 'utf8'));
          const markdown = \`# Lighthouse Report

          **Performance**: \${report.categories.performance.score * 100}%
          **Accessibility**: \${report.categories.accessibility.score * 100}%
          **Best Practices**: \${report.categories['best-practices'].score * 100}%
          **SEO**: \${report.categories.seo.score * 100}%
          **PWA**: \${report.categories.pwa.score * 100}%

          \`;
          fs.writeFileSync('./lighthouse-report.md', markdown);
          EOF
          node convert-lighthouse-report.js

      - name: Upload Lighthouse report
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report
          path: ./lighthouse-report.md

      - name: Post Lighthouse report as PR comment
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: ./lighthouse-report.md
